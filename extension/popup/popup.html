<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake News Detector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Fake News Detector</h1>
      <p class="subtitle">Phát hiện tin giả trên Facebook</p>
    </header>

    <!-- Toggle Enable -->
    <div class="toggle-section">
      <label class="toggle">
        <input type="checkbox" id="enable-toggle" checked>
        <span class="slider"></span>
      </label>
      <span>Bật extension</span>
    </div>

    <!-- Mode Selection -->
    <section class="section">
      <h2>Chế độ hoạt động</h2>
      <div class="mode-selector">
        <label class="mode-option">
          <input type="radio" name="mode" value="feed" checked>
          <div class="mode-card">
            <span class="mode-icon">📰</span>
            <span class="mode-name">Feed</span>
            <span class="mode-desc">Bài random, không lưu user</span>
          </div>
        </label>
        <label class="mode-option">
          <input type="radio" name="mode" value="group">
          <div class="mode-card">
            <span class="mode-icon">👥</span>
            <span class="mode-name">Nhóm</span>
            <span class="mode-desc">Lưu lịch sử user theo nhóm</span>
          </div>
        </label>
      </div>
      
      <!-- Group Info (shown when in group mode) -->
      <div id="group-info" class="group-info hidden">
        <span class="label">Nhóm hiện tại:</span>
        <span id="current-group" class="value">-</span>
      </div>
    </section>

    <!-- Statistics -->
    <section class="section">
      <h2>Thống kê</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">Tổng</span>
        </div>
        <div class="stat-card real">
          <span class="stat-value" id="stat-real">0</span>
          <span class="stat-label">Tin thật</span>
        </div>
        <div class="stat-card fake">
          <span class="stat-value" id="stat-fake">0</span>
          <span class="stat-label">Tin giả</span>
        </div>
      </div>
      <button id="reset-stats" class="btn-secondary">Đặt lại thống kê</button>
    </section>

    <!-- Manual Analysis -->
    <section class="section">
      <h2>Phân tích thủ công</h2>
      <textarea id="manual-text" placeholder="Nhập nội dung cần kiểm tra..."></textarea>
      <button id="analyze-btn" class="btn-primary">Phân tích</button>
      
      <div id="manual-result" class="result hidden">
        <div class="result-label">Kết quả:</div>
        <div class="result-value" id="result-text">-</div>
        <div class="result-confidence" id="result-confidence">-</div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <p>Vietnamese Fake News Detector v1.0</p>
      <p class="small">Server: <span id="server-status">Đang kiểm tra...</span></p>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
