<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake News Detector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <div class="logo">🛡️</div>
      <h1>Fake News Detector</h1>
    </header>

    <!-- Toggle -->
    <div class="card toggle-card">
      <span class="toggle-label">Extension</span>
      <label class="toggle">
        <input type="checkbox" id="enable-toggle" checked>
        <span class="slider"></span>
      </label>
    </div>

    <!-- Context Info -->
    <div class="card context-card">
      <div class="context-header">
        <span class="context-icon" id="context-icon">📰</span>
        <span class="context-mode" id="context-mode">Feed</span>
      </div>
      <div class="context-detail hidden" id="group-detail">
        <div class="group-id" id="group-id">-</div>
      </div>
    </div>

    <!-- Stats -->
    <div class="card stats-card">
      <div class="stats-header">
        <span>Thống kê phiên</span>
        <button class="btn-reset" id="reset-stats" title="Đặt lại">↺</button>
      </div>
      <div class="stats-grid">
        <div class="stat">
          <span class="stat-value" id="stat-total">0</span>
          <span class="stat-label">Tổng</span>
        </div>
        <div class="stat real">
          <span class="stat-value" id="stat-real">0</span>
          <span class="stat-label">Thật</span>
        </div>
        <div class="stat fake">
          <span class="stat-value" id="stat-fake">0</span>
          <span class="stat-label">Giả</span>
        </div>
      </div>
      <div class="stats-bar">
        <div class="bar-real" id="bar-real"></div>
        <div class="bar-fake" id="bar-fake"></div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="server-status">
        <span class="status-dot" id="status-dot"></span>
        <span id="server-status">Đang kiểm tra...</span>
      </div>
      <span class="version">v1.0</span>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
